<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G JIFFY Dashboard</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#007bff;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.menu-btn{
display:block;
width:100%;
padding:15px;
margin-top:10px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
}

.inward{
background:#28a745;
color:white;
}

.stockout{
background:#dc3545;
color:white;
}

.report{
background:#17a2b8;
color:white;
}

.logout{
background:#6c757d;
color:white;
}
</style>

</head>

<body>

<div class="header">
G JIFFY INVENTORY
</div>

<div class="container">

<div class="card">
<h3>Dashboard</h3>

<p>Total Stock : 0</p>

<p>Today Inward : 0</p>

<p>Today Sale : 0</p>
</div>

<button class="menu-btn inward"
onclick="location.href='inward.html'">
NEW INWARD
</button>

<button class="menu-btn stockout"
onclick="location.href='stockout.html'">
STOCK OUT
</button>

<button class="menu-btn report"
onclick="location.href='report.html'">
REPORTS
</button>

<button class="menu-btn logout"
onclick="location.href='index.html'">
LOGOUT
</button>

</div>

</body>
</html>Add Dashboard Page
